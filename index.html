<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Surf Sandbox Test</title>
</head>
<body>
    <h1>🌊 Surf Sandbox</h1>
    
    <div>
        <span id="statusText">⚡ Ready</span>
    </div>
    
    <div style="margin: 20px 0;">
        <button id="startBtn">🎤 Start Mic</button>
        <button id="stopBtn" disabled>⏹️ Stop</button>
        <button id="testAuthBtn">🔐 Test Auth</button>
    </div>
    
    <div>
        <strong>📝 Logs:</strong>
        <button id="clearLogsBtn">Clear</button>
    </div>
    
    <pre id="logContainer" style="background:#000; padding:10px; height:400px; overflow-y:scroll; border:1px solid #333;">[--:--] Ready</pre>

    <!-- Libraries -->
    <script src="lib/socket.io.min.js"></script>
    <script src="lib/mediasoup-client.bundle.js"></script>
    
    <!-- Sandbox Modules -->
    <script type="module">
        import { loadSileroVAD, startVAD, stopVAD } from './sandbox/vad.js';
        import { playTTSAudio } from './sandbox/tts.js';
        import { setAuthToken, startRESTRecording, stopRESTRecording, sendAccumulatedAudio } from './sandbox/rest-client.js';
        import { connectWebRTC, disconnectWebRTC } from './sandbox/webrtc-client.js';
        
        // Supabase config
        const SUPABASE_URL = 'https://ljksgzttnufecxohwtwm.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxqa3NnenR0bnVmZWN4b2h3dHdtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxOTc1NzQsImV4cCI6MjA5MTc3MzU3NH0.jSnVFEe6w-fUA39iD7o9BP0EygB7yejofuU4GUbK6Bk';
        
        // State
        let authToken = null;
        let localStream = null;
        let isActive = false;
        
        // DOM
        const statusText = document.getElementById('statusText');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const testAuthBtn = document.getElementById('testAuthBtn');
        const logContainer = document.getElementById('logContainer');
        const clearLogsBtn = document.getElementById('clearLogsBtn');
        
        // Logging
        function log(message) {
            const time = new Date().toLocaleTimeString();
            logContainer.innerHTML += `[${time}] ${message}\n`;
            logContainer.scrollTop = logContainer.scrollHeight;
        }
        
        clearLogsBtn.onclick = () => logContainer.innerHTML = '[--:--] Ready\n';
        
        // Auth
        async function testAuth() {
            log('🔐 Authenticating...');
            try {
                const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
                    method: 'POST',
                    headers: { 'apikey': SUPABASE_ANON_KEY, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: 'surf@testuser.com', password: 'Test1234!' })
                });
                const data = await res.json();
                authToken = data.access_token;
                setAuthToken(authToken);
                log('✅ Got token: ' + authToken.slice(0, 30) + '...');
                statusText.textContent = '🔐 Authenticated';
            } catch (e) {
                log('❌ Auth failed: ' + e.message);
            }
        }
        
        // TTS callback
        async function handleTTS(audio) {
            log('🔊 Playing TTS...');
            await playTTSAudio(audio);
        }
        
        // Start mic
        async function startMic() {
            if (!authToken) {
                log('❌ No auth token - click Test Auth first');
                return;
            }
            
            startBtn.disabled = true;
            log('🎤 Starting mic...');
            
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                log('✅ Mic ready: ' + localStream.getAudioTracks()[0].label);
                
                // Load VAD
                await loadSileroVAD();
                
                // Try WebRTC
                log('📡 Trying WebRTC...');
                const webrtcOk = await connectWebRTC(authToken, localStream, {
                    onStatusChange: (s) => { statusText.textContent = s; log('Status: ' + s); },
                    onLog: log,
                    onTTS: handleTTS,
                    onTranscript: (t) => log('📝 ' + t),
                    onResponse: (r) => log('🤖 ' + r)
                });
                
                if (webrtcOk) {
                    log('✅ WebRTC connected!');
                    startVAD(localStream, {
                        onSpeechStart: () => log('🎙️ Speaking...'),
                        onSpeechEnd: () => log('🔇 Silence')
                    });
                } else {
                    log('⚠️ WebRTC failed, using REST');
                    startRESTRecording(localStream);
                    startVAD(localStream, {
                        onSpeechStart: () => log('🎙️ Speaking...'),
                        onSpeechEnd: () => {
                            log('📤 Sending...');
                            sendAccumulatedAudio({
                                onTranscript: (t) => log('📝 ' + t),
                                onResponse: (r) => log('🤖 ' + r),
                                onTTS: handleTTS,
                                onLog: log
                            });
                        }
                    });
                }
                
                isActive = true;
                stopBtn.disabled = false;
                startBtn.textContent = '🎤 Active';
                
            } catch (e) {
                log('❌ Failed: ' + e.message);
                startBtn.disabled = false;
            }
        }
        
        // Stop mic
        function stopMic() {
            log('⏹️ Stopping...');
            
            disconnectWebRTC();
            stopRESTRecording();
            stopVAD();
            
            if (localStream) {
                localStream.getTracks().forEach(t => t.stop());
                localStream = null;
            }
            
            isActive = false;
            startBtn.textContent = '🎤 Start Mic';
            startBtn.disabled = false;
            stopBtn.disabled = true;
            statusText.textContent = authToken ? '🔐 Ready' : '⚡ Ready';
            log('✅ Stopped');
        }
        
        // Event listeners
        testAuthBtn.onclick = testAuth;
        startBtn.onclick = startMic;
        stopBtn.onclick = stopMic;
        
        // Init
        log('🌊 Sandbox ready');
        window.testAuth = testAuth;
        window.startMic = startMic;
    </script>
</body>
</html>
