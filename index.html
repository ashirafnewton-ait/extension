<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surf Voice - Sandbox</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'SF Mono', 'Monaco', 'Inconsolata', monospace;
            background: #0a0f0f;
            color: #00ff9d;
            padding: 10px;
        }
        #status-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 14px;
            background: #0d1117;
            border-radius: 30px;
            border: 1px solid #2a3a4a;
            width: fit-content;
        }
        #status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff4444;
            transition: all 0.2s;
        }
        #status-dot.connected { background: #00ff9d; box-shadow: 0 0 10px #00ff9d; }
        #status-dot.sfu { background: #00aaff; box-shadow: 0 0 10px #00aaff; }
        #status-text { font-size: 12px; color: #8a9aaa; }
        #mode-badge {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 12px;
            background: #1a2332;
            color: #00ff9d;
        }
    </style>
</head>
<body>
    <div id="status-bar">
        <span id="status-dot"></span>
        <span id="status-text">Initializing...</span>
        <span id="mode-badge">--</span>
    </div>

    <!-- Third-party libraries -->
    <script src="lib/socket.io.min.js"></script>
    <!-- <script src="lib/mediasoup-client.bundle.js"></script> -->
    
    <!-- Main sandbox entry point -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.17.0/dist/ort.min.js"></script>
<script>
    // Wait for ORT then load vad-web
    window.ortReady = new Promise((resolve) => {
        const check = setInterval(() => {
            if (window.ort && window.ort.InferenceSession) {
                clearInterval(check);
                resolve();
            }
        }, 100);
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.22/dist/bundle.min.js"></script>
<script>
    window.ortReady.then(() => {
        if (window.vad && window.vad.MicVAD) {
            window.MicVAD = window.vad.MicVAD;
            console.log('[VAD] MicVAD loaded');
        } else {
            console.warn('[VAD] MicVAD not available, using fallback');
        }
    });
</script>
<script type="module" src="sandbox/sandbox-main.js"></script>
    
    <!-- Minimal inline status updater -->
    <script>
        // Reset VAD state (called when lock releases)
    window.resetVADState = function() {
        console.log('[VAD] State reset via window');
    };
    
    window.addEventListener('message', (e) => {
            if (e.data.type === 'status') {
                document.getElementById('status-text').textContent = e.data.text;
            }
            if (e.data.type === 'streaming') {
                const dot = document.getElementById('status-dot');
                const badge = document.getElementById('mode-badge');
                dot.className = e.data.mode === 'sfu' ? 'sfu' : 'connected';
                badge.textContent = e.data.mode?.toUpperCase() || '--';
            }
            if (e.data.type === 'disconnected') {
                const dot = document.getElementById('status-dot');
                const badge = document.getElementById('mode-badge');
                if (dot) dot.className = '';
                if (badge) badge.textContent = '--';
                const st = document.getElementById('status-text');
                if (st) st.textContent = 'Disconnected';
            }
        });
    </script>
</body>
</html>
